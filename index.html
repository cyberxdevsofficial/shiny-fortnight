<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anuga Hostingz Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="text-gray-200">

<div id="canvas-container" class="fixed top-0 left-0 w-full h-full z-0 bg-black"></div>

<div id="loading-view" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black">
  <div class="w-12 h-12 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
</div>

<div id="login-view" class="hidden relative h-screen flex items-center justify-center px-4 z-10">
  <div class="max-w-md w-full p-12 glass-card rounded-2xl text-center">
    <h1 class="text-4xl font-bold mb-3 text-white">Anuga Hostingz</h1>
    <p class="text-slate-400 mb-6">Login with Google or GitHub</p>

    <div class="space-y-4">
      <button id="google-login-btn" class="w-full flex items-center justify-center gap-4 px-6 py-4 bg-white text-slate-900 font-bold rounded-2xl shadow-lg hover:bg-slate-100 transition">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" class="w-6 h-6"> Google Login
      </button>

      <button id="github-login-btn" class="w-full flex items-center justify-center gap-4 px-6 py-4 bg-[#24292f] text-white font-bold rounded-2xl shadow-lg border border-white/10 hover:bg-[#1a1f24] transition">
        <i class="fab fa-github text-2xl"></i> GitHub Login
      </button>
    </div>

    <p id="error-msg" class="text-red-400 mt-6 text-xs hidden bg-red-500/10 p-3 rounded-xl border border-red-500/20"></p>
  </div>
</div>

<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/auth.js"></script>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js';

let scene, camera, renderer, stars, starGeo;

function init3D() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
  camera.position.z = 1;
  camera.rotation.x = Math.PI/2;

  renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.getElementById('canvas-container').appendChild(renderer.domElement);

  starGeo = new THREE.BufferGeometry();
  const positions = [];
  for(let i=0;i<8000;i++){
    let star = new THREE.Vector3(Math.random()*600-300, Math.random()*600-300, Math.random()*600-300);
    positions.push(star.x, star.y, star.z);
  }
  starGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions,3));

  let sprite = new THREE.TextureLoader().load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/sprites/circle.png');
  let starMaterial = new THREE.PointsMaterial({ color:0x4f46e5, size:0.5, map:sprite, transparent:true, opacity:0.8 });
  stars = new THREE.Points(starGeo, starMaterial);
  scene.add(stars);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  document.addEventListener('mousemove', (e)=>{
    stars.rotation.y = (e.clientX/window.innerWidth - 0.5)*0.2;
    stars.rotation.x = (e.clientY/window.innerHeight - 0.5)*0.2;
  });

  function animate(){
    const pos = starGeo.attributes.position.array;
    for(let i=1;i<pos.length;i+=3){ pos[i]-=0.05; if(pos[i]<-200) pos[i]=200; }
    starGeo.attributes.position.needsUpdate = true;
    stars.rotation.y+=0.0005;
    renderer.render(scene,camera);
    requestAnimationFrame(animate);
  }
  animate();
}
window.onload = init3D;
</script>
</body>
</html>
